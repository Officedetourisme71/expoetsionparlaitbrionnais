<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exposition Photo - Brionnais</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @font-face {
      font-family: 'Clarity';
      src: url('fonts/Clarity-Regular.woff2') format('woff2'),
           url('fonts/Clarity-Regular.woff') format('woff');
      font-display: swap;
    }

    body {
      font-family: 'Clarity', sans-serif;
    }

    .audio-player {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 8px;
    }

    .audio-player audio {
      width: 100%;
      height: 32px;
    }

    .audio-label {
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: #374151;
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- HERO -->
  <header class="relative h-[50vh] flex items-end">
    <img src="images/hero.jpg" class="absolute w-full h-full object-cover">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative p-6 text-white">
      <h1 class="text-3xl font-bold mb-2">Exposition du Brionnais</h1>
      <p class="text-sm">Une immersion sonore et visuelle au cœur du territoire.</p>
    </div>
  </header>

  <!-- INTRO -->
  <section class="p-6">
    <p class="text-base leading-relaxed">
      Chaque photographie est accompagnée de témoignages à écouter.
    </p>
  </section>

  <!-- PARCOURS -->
  <section class="px-4 pb-10 space-y-6">

    <!-- PHOTO 1 -->
    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <img src="images/photo1.jpg" class="w-full object-contain bg-white">
      <div class="p-4 space-y-3">
        <h2 class="font-semibold">Lieu 1</h2>

        <div>
          <div class="audio-label">Témoignage 1</div>
          <div class="audio-player">
            <audio controls playsinline>
              <source src="audios/audio1.m4a" type="audio/mp4">
              <source src="audios/audio1.mp3" type="audio/mpeg">
            </audio>
          </div>
        </div>

        <div>
          <div class="audio-label">Témoignage 2</div>
          <div class="audio-player">
            <audio controls playsinline>
              <source src="audios/audio1b.m4a" type="audio/mp4">
              <source src="audios/audio1b.mp3" type="audio/mpeg">
            </audio>
          </div>
        </div>

        <div>
          <div class="audio-label">Témoignage 3</div>
          <div class="audio-player">
            <audio controls playsinline>
              <source src="audios/audio1c.m4a" type="audio/mp4">
              <source src="audios/audio1c.mp3" type="audio/mpeg">
            </audio>
          </div>
        </div>
      </div>
    </div>

    <!-- PHOTO 2 -->
    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <img src="images/photo2.jpg" class="w-full object-contain bg-white">
      <div class="p-4">
        <h2 class="font-semibold mb-2">Lieu 2</h2>
        <div class="audio-player">
          <audio controls playsinline>
            <source src="audios/audio2.m4a" type="audio/mp4">
            <source src="audios/audio2.mp3" type="audio/mpeg">
          </audio>
        </div>
      </div>
    </div>

    <!-- PHOTO 3 -->
    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <img src="images/photo3.jpg" class="w-full object-contain bg-white">
      <div class="p-4">
        <h2 class="font-semibold mb-2">Lieu 3</h2>
        <div class="audio-player">
          <audio controls playsinline>
            <source src="audios/audio3.m4a" type="audio/mp4">
            <source src="audios/audio3.mp3" type="audio/mpeg">
          </audio>
        </div>
      </div>
    </div>

    <!-- PHOTO 4 -->
    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <img src="images/photo4.jpg" class="w-full object-contain bg-white">
      <div class="p-4">
        <h2 class="font-semibold mb-2">Lieu 4</h2>
        <div class="audio-player">
          <audio controls playsinline>
            <source src="audios/audio4.m4a" type="audio/mp4">
            <source src="audios/audio4.mp3" type="audio/mpeg">
          </audio>
        </div>
      </div>
    </div>

    <!-- PHOTO 5 -->
    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <img src="images/photo5.jpg" class="w-full object-contain bg-white">
      <div class="p-4">
        <h2 class="font-semibold mb-2">Lieu 5</h2>
        <div class="audio-player">
          <audio controls playsinline>
            <source src="audios/audio5.m4a" type="audio/mp4">
            <source src="audios/audio5.mp3" type="audio/mpeg">
          </audio>
        </div>
      </div>
    </div>

  </section>

  <!-- FOOTER -->
  <footer class="bg-white py-8">
    <div class="text-center mb-4 font-semibold">Partenaires</div>
    <div class="flex flex-wrap justify-center gap-4 px-4">
      <img src="logos/logo1.png" class="h-10 object-contain opacity-80">
      <img src="logos/logo2.png" class="h-10 object-contain opacity-80">
      <img src="logos/logo3.png" class="h-10 object-contain opacity-80">
    </div>
  </footer>

</body>
</html>
